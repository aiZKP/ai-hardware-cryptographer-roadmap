      <text x="923" y="167" text-anchor="middle" fill="#DFFAF7" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Embedded</text>
    </g>

    <g>
      <rect x="988" y="182" width="134" height="34" rx="17" fill="#1E293B" stroke="#3F7CD8"/>
      <text x="1055" y="204" text-anchor="middle" fill="#F1F7FF" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">AI Workloads</text>
    </g>

    <g>
      <rect x="1002" y="310" width="108" height="34" rx="17" fill="#3B2720" stroke="#E27B3B"/>
      <text x="1056" y="332" text-anchor="middle" fill="#FFF0E4" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Deploy</text>
    </g>

    <g>
      <rect x="858" y="409" width="130" height="34" rx="17" fill="#111827" stroke="#52637F"/>
      <text x="923" y="431" text-anchor="middle" fill="#E8EEF9" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700">Specialize</text>
    </g>

    <g opacity="0.85">
