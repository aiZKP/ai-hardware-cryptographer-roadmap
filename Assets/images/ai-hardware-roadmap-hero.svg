      <circle cx="782" cy="312" r="3" fill="#2DD4BF"/>
      <circle cx="1082" cy="258" r="3" fill="#8FB3FF"/>
      <circle cx="940" cy="470" r="3" fill="#F59E0B"/>
      <circle cx="1034" cy="396" r="3" fill="#E5ECF9"/>
      <path d="M760 280H832" stroke="#35507D" stroke-opacity="0.65" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M1012 258H1076" stroke="#35507D" stroke-opacity="0.65" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M958 468H1038" stroke="#35507D" stroke-opacity="0.65" stroke-width="1.5" stroke-linecap="round"/>
    </g>
