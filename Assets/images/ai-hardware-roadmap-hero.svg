<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="68" y1="44" x2="1138" y2="684" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1220"/>
      <stop offset="1" stop-color="#13203B"/>
    </linearGradient>
    <radialGradient id="journeyGlowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(936 258) rotate(90) scale(228 258)">
      <stop stop-color="#214EBC" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#214EBC" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="journeyGlowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1002 208) rotate(90) scale(148 148)">
      <stop stop-color="#14B8A6" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="journeyGlowC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(860 396) rotate(90) scale(138 138)">
      <stop stop-color="#F59E0B" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0"/>
