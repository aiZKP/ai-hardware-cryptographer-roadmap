      - 5. LLM App Development: Phase 3 - Artificial Intelligence/Track B - Agentic AI and ML Engineering/5. LLM Application Development/Guide.md
    - CMU AI Courses: Phase 3 - Artificial Intelligence/CMU-AI-Courses.md

