site_name: AI Hardware Engineer Roadmap
site_url: https://ai-hpc.github.io/ai-hardware-engineer-roadmap/
site_description: Design a custom AI inference chip. 8 layers, 23 sub-layers, 5 phases.
site_author: ai-hpc
repo_url: https://github.com/ai-hpc/ai-hardware-engineer-roadmap
repo_name: ai-hpc/ai-hardware-engineer-roadmap
edit_uri: edit/main/

docs_dir: docs

theme:
  name: material
  logo: Assets/images/ai-hardware-engineer.png
  favicon: Assets/images/ai-hardware-engineer.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ai-hpc
  generator: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search
  - tags

extra_css:
  - Assets/css/custom.css

nav:
  - Home: README.md
  - Roles & Market: Roles and Market Analysis.md

  - Phase 1 — Digital Foundations:
    - Overview: Phase 1 - Foundational Knowledge/1. Digital Design and Hardware Description Languages/Guide.md
    - Digital Design:
      - Guide: Phase 1 - Foundational Knowledge/1. Digital Design and Hardware Description Languages/Guide.md
      - Fundamentals: Phase 1 - Foundational Knowledge/1. Digital Design and Hardware Description Languages/Digital Design Fundamentals/Guide.md
      - HDLs: Phase 1 - Foundational Knowledge/1. Digital Design and Hardware Description Languages/Hardware Description Languages (HDLs)/Guide.md
    - Computer Architecture: Phase 1 - Foundational Knowledge/2. Computer Architecture and Hardware/Guide.md
    - Operating Systems: Phase 1 - Foundational Knowledge/3. Operating Systems/Guide.md
    - C++ & Parallel Computing:
      - Guide: Phase 1 - Foundational Knowledge/4. C++ and Parallel Computing/Guide.md
      - C++ and SIMD: Phase 1 - Foundational Knowledge/4. C++ and Parallel Computing/C++ and SIMD/Guide.md
      - OpenMP and oneTBB: Phase 1 - Foundational Knowledge/4. C++ and Parallel Computing/OpenMP and OneTBB/Guide.md
      - CUDA and SIMT: Phase 1 - Foundational Knowledge/4. C++ and Parallel Computing/CUDA and SIMT/Guide.md
      - ROCm and HIP: Phase 1 - Foundational Knowledge/4. C++ and Parallel Computing/ROCm and HIP/Guide.md
      - OpenCL and SYCL: Phase 1 - Foundational Knowledge/4. C++ and Parallel Computing/OpenCL and SYCL/Guide.md

  - Phase 2 — Embedded Systems:
    - Schematic & PCB: Phase 2 - Embedded Systems/1. Schematic Capture and PCB Design/Guide.md
    - Embedded Software: Phase 2 - Embedded Systems/2. Embedded Software/Guide.md
    - Embedded Linux:
      - Guide: Phase 2 - Embedded Systems/3. Embedded Linux/Guide.md
      - Yocto: Phase 2 - Embedded Systems/3. Embedded Linux/Yocto/Guide.md

  - Phase 3 — AI:
    - Overview: Phase 3 - Artificial Intelligence/Guide.md
    - 1. Neural Networks: Phase 3 - Artificial Intelligence/1. Neural Networks/Guide.md
    - 2. Frameworks:
      - Guide: Phase 3 - Artificial Intelligence/2. Deep Learning Frameworks/Guide.md
      - micrograd: Phase 3 - Artificial Intelligence/2. Deep Learning Frameworks/micrograd/Guide.md
      - PyTorch: Phase 3 - Artificial Intelligence/2. Deep Learning Frameworks/PyTorch/Guide.md
      - tinygrad: Phase 3 - Artificial Intelligence/2. Deep Learning Frameworks/tinygrad/Guide.md
    - "Track A: Hardware & Edge AI":
      - 3. Computer Vision: Phase 3 - Artificial Intelligence/Track A - Hardware and Edge AI/3. Computer Vision/Guide.md
      - 4. Sensor Fusion:
        - Guide: Phase 3 - Artificial Intelligence/Track A - Hardware and Edge AI/4. Sensor Fusion/Guide.md
