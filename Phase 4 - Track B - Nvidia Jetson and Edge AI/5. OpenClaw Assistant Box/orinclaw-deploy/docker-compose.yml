# OrinClaw — template Docker Compose for Jetson (L4T)
# JetPack lifecycle: 5.1.2 (initial) → 6.2.1 (production-aligned) → 7.x when officially supported.
# Tag images for your L4T line (e.g. r35.x vs r36.x)—do not mix across JetPack upgrades.
#
# Uncomment and fill in services after you have L4T-compatible images.
# Copy to e.g. /opt/orinclaw/ on the device; bind-mount /data/* per Guide.md.
# Storage: 512GB NVMe default—pin image digests; FDE on host per Guide §8 (stolen-drive requirements).
#
# Prerequisites: nvidia-container-toolkit, Docker Compose v2.
#
# Example prep:
#   sudo mkdir -p /data/{models,skills,logs,config} && sudo chown -R "$USER:$USER" /data
#   chmod 700 /data/config

name: orinclaw

services:
  # --- Uncomment one block at a time and set image/build ---
  #
  # openclaw-gateway:
  #   image: your-registry/orinclaw-openclaw:l4t-r36.x
  #   restart: unless-stopped
  #   network_mode: host
  #   volumes:
  #     - /data/config:/data/config:ro
  #     - /data/skills:/data/skills
  #     - /data/logs:/data/logs
  #   environment:
  #     - NODE_ENV=production
  #
  # stt:
  #   image: your-registry/orinclaw-stt:l4t-r36.x
  #   restart: unless-stopped
  #   runtime: nvidia
  #   volumes:
  #     - /data/models:/data/models:ro
  #
  # llm:
  #   image: your-registry/orinclaw-llm:l4t-r36.x
  #   restart: unless-stopped
  #   runtime: nvidia
  #   volumes:
  #     - /data/models:/data/models:ro
  #     - /data/config:/data/config:ro
  #
  # tts:
  #   image: your-registry/orinclaw-tts:l4t-r36.x
  #   restart: unless-stopped
  #   runtime: nvidia
  #   volumes:
  #     - /data/models:/data/models:ro

  # Minimal no-op so `docker compose config` validates before you add real images.
  orinclaw-compose-ok:
    image: alpine:3.20
    command: ["true"]
    profiles:
      - template-only

networks:
  default:
    name: orinclaw_default
